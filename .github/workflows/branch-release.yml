name: Branch Release
run-name: Branch Release #${{ inputs.release_id }} to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: "Release batch id from git-console"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        type: string
      base_branch:
        description: "Base branch used to create deploy branch"
        required: true
        default: "main"
        type: string
      deploy_branch:
        description: "Deploy branch to create"
        required: true
        type: string
      target_branches:
        description: "Comma-separated feature branches"
        required: false
        default: ""
        type: string

concurrency:
  group: branch-release-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  prepare-deploy-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create environment branch from base
        env:
          BASE_BRANCH: ${{ inputs.base_branch }}
          DEPLOY_BRANCH: ${{ inputs.deploy_branch }}
        run: |
          git fetch origin "${BASE_BRANCH}"
          git checkout -B "${DEPLOY_BRANCH}" "origin/${BASE_BRANCH}"

      - name: Merge target feature branches
        env:
          TARGET_BRANCHES: ${{ inputs.target_branches }}
          DEPLOY_BRANCH: ${{ inputs.deploy_branch }}
        run: |
          if [ -z "${TARGET_BRANCHES}" ]; then
            echo "No target branches to merge, deploy branch will stay aligned with base branch"
            exit 0
          fi

          IFS=',' read -r -a BRANCH_ARRAY <<< "${TARGET_BRANCHES}"
          MERGE_HEADS=()
          for raw_branch in "${BRANCH_ARRAY[@]}"; do
            branch="$(echo "${raw_branch}" | xargs)"
            if [ -z "${branch}" ]; then
              continue
            fi
            echo "Preparing ${branch} for ${DEPLOY_BRANCH}"
            git fetch origin "${branch}"
            MERGE_HEADS+=("origin/${branch}")
          done

          if [ "${#MERGE_HEADS[@]}" -eq 0 ]; then
            echo "No valid target branches after normalization"
            exit 0
          fi

          git merge --squash "${MERGE_HEADS[@]}"

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Spring Boot application
        run: mvn --batch-mode -pl hello-service -am clean package

      - name: Generate image name and tag
        id: vars
        shell: bash
        run: |
          IMAGE="ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          TREE_SHA="$(git write-tree)"
          TAG="${TREE_SHA::12}"

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:${{ inputs.environment }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes image
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          sed -i -E \
            "s#^([[:space:]]*)image: .*#\1image: ${IMAGE}:${TAG}#" \
            k8s/deployment.yaml

          echo "Updated deployment:"
          grep "image:" k8s/deployment.yaml

      - name: Commit environment manifest
        env:
          RELEASE_ID: ${{ inputs.release_id }}
          ENVIRONMENT: ${{ inputs.environment }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          TARGET_BRANCHES: ${{ inputs.target_branches }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No manifest change"
          else
            BRANCH_LABEL="$(echo "${TARGET_BRANCHES}" | xargs)"
            if [ -z "${BRANCH_LABEL}" ]; then
              BRANCH_LABEL="base ${BASE_BRANCH}"
            fi
            git commit -m "release(${ENVIRONMENT}): ${BRANCH_LABEL} image ${TAG}"
          fi

      - name: Push environment branch
        env:
          DEPLOY_BRANCH: ${{ inputs.deploy_branch }}
        run: |
          git push --force origin "${DEPLOY_BRANCH}"

      - name: Release summary
        env:
          RELEASE_ID: ${{ inputs.release_id }}
          ENVIRONMENT: ${{ inputs.environment }}
          DEPLOY_BRANCH: ${{ inputs.deploy_branch }}
          TARGET_BRANCHES: ${{ inputs.target_branches }}
          IMAGE: ${{ steps.vars.outputs.image }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_STEP_SUMMARY"
          echo "environment=${ENVIRONMENT}" >> "$GITHUB_STEP_SUMMARY"
          echo "environment_branch=${DEPLOY_BRANCH}" >> "$GITHUB_STEP_SUMMARY"
          echo "target_branches=${TARGET_BRANCHES}" >> "$GITHUB_STEP_SUMMARY"
          echo "image=${IMAGE}:${TAG}" >> "$GITHUB_STEP_SUMMARY"
