name: Build Image And Update Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - "hello-service/**"
      - "pom.xml"
      - "Dockerfile"
      - ".github/workflows/ci-cd.yml"

  # 允许在 GitHub 页面手动运行
  workflow_dispatch:

permissions:
  # GitHub Actions 需要提交更新后的 deployment.yaml
  contents: write

  # GitHub Actions 需要向 GHCR 推送镜像
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Spring Boot application
        run: mvn --batch-mode -pl hello-service -am clean package

      - name: Generate image name and tag
        id: vars
        shell: bash
        run: |
          IMAGE="ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          TAG="${GITHUB_SHA::12}"

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          echo "IMAGE=${IMAGE}"
          echo "TAG=${TAG}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 支持同时构建 Intel Mac 和 Apple Silicon 可运行的镜像
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true

          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
            ${{ steps.vars.outputs.image }}:latest

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes image
        env:
          IMAGE: ${{ steps.vars.outputs.image }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          sed -i -E \
            "s#^([[:space:]]*)image: .*#\1image: ${IMAGE}:${TAG}#" \
            k8s/deployment.yaml

          echo "Updated deployment:"
          grep "image:" k8s/deployment.yaml

      - name: Commit Kubernetes manifest
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/deployment.yaml

          if git diff --cached --quiet; then
            echo "No manifest change"
            exit 0
          fi

          git commit -m "deploy image ${TAG} [skip ci]"
          git push
